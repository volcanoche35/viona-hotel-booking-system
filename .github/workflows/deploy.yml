name: Build & Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Notify Coolify
        if: ${{ vars.COOLIFY_WEBHOOK_URL != '' }}
        run: |
          curl -s -X GET "${{ vars.COOLIFY_WEBHOOK_URL }}" || true
